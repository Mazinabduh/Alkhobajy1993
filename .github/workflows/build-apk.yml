name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/khubji-electric.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: khubji-electric-debug
          path: android/app/build/outputs/apk/debug/khubji-electric.apk

      - name: Delete old release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: latest
          github_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "محطة الخبجي الكهربائية - أحدث إصدار"
          body: "تطبيق محطة الخبجي الكهربائية - إصدار تجريبي"
          files: android/app/build/outputs/apk/debug/khubji-electric.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
